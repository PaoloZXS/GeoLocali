<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Pannello amministrativo per l'approvazione degli utenti"
    />
    <meta name="theme-color" content="#1976D2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Locali" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <title>Admin - Approva utenti</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../default/style.css" />
    <!-- Material Symbols – load full set with variation axes in one request -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <!-- versioned to bust cache; use absolute path so static serves correct MIME -->
    <link rel="stylesheet" href="/admin/style.css?v=2" />
  </head>
  <body>
    <div class="header">
      <h1>
        GEO-Locali
        <span
          style="
            font-size: 0.6em;
            font-weight: normal;
            color: white;
            opacity: 1.85;
          "
          >(amministrazione)</span
        >
        <a
          id="qrLink"
          href="/qr"
          style="color: inherit; text-decoration: none; margin-left: 20px"
        >
          <span
            class="material-symbols-outlined"
            style="vertical-align: middle; font-size: 1.2em"
            >qr_code</span
          >
        </a>
      </h1>
      <div id="userInfo" style="margin-top: 8px; font-size: 0.9em"></div>
    </div>
    <div class="content">
      <!-- riga data rimossa -->
      <div class="dual-tables">
        <div class="table-wrapper">
          <h2 class="pending-title">
            <span
              class="material-symbols-outlined"
              style="vertical-align: middle; margin-right: 6px"
              >notifications_paused</span
            >Utenti in attesa di approvazione
            <span id="pending-count" style="font-size: 0.8em; color: #c00"
              >(0)</span
            >
          </h2>
          <div id="pendingContainer" class="user-list">
            <div class="row header">
              <div class="cell">Nome</div>
              <div class="cell">Username</div>
              <div class="cell actions">Azioni</div>
            </div>
            <!-- rows inserted here -->
          </div>
        </div>
        <div class="table-wrapper">
          <h2 class="approved-title">
            <span
              class="material-symbols-outlined"
              style="vertical-align: middle; margin-right: 6px; color: green"
              >person_check</span
            >Utenti autorizzati
            <span id="approved-count" style="font-size: 0.8em; color: green"
              >(0)</span
            >
          </h2>
          <div id="approvedContainer" class="user-list">
            <div class="row header">
              <div class="cell">Nome</div>
              <div class="cell">Username</div>
              <div class="cell actions">Azioni</div>
            </div>
            <!-- rows inserted here -->
          </div>
        </div>
      </div>
      <!-- Pulsante indietro spostato sotto le tabelle, allineato a destra -->
      <div class="indietro-container">
        <a
          href="/default/default.html"
          class="indietro-link"
          style="
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
          "
        >
          <span class="material-symbols-outlined indietro-hover back-icon"
            >arrow_circle_left</span
          >
          <span class="back-label">Indietro</span>
        </a>
      </div>
    </div>
    <div
      id="notification"
      style="
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        color: #fff;
        padding: 10px 20px;
        border-radius: 4px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        font-family: sans-serif;
        z-index: 1000;
      "
    ></div>
    <div class="footer">
      <p>&copy; 2026 Spectrum Italia</p>
    </div>

    <script>
      // helper that sets authorization header automatically
      function apiFetch(url, opts = {}) {
        opts.headers = opts.headers || {};
        const token = localStorage.getItem("authToken");
        if (token) opts.headers["Authorization"] = "Bearer " + token;
        return fetch(url, opts);
      }

      function showNotification(msg, error) {
        const note = document.getElementById("notification");
        if (!note) return alert(msg);
        note.textContent = msg;
        note.style.background = error ? "#f44336" : "#4caf50";
        note.style.display = "block";
        setTimeout(() => {
          note.style.display = "none";
        }, 2000);
      }
    </script>
    <script type="module">
      // Import offline support modules
      import {
        initOfflineDetection,
        updatePendingSyncBadge
      } from "./offline.js";

      // Initialize offline detection on load
      window.addEventListener("load", () => {
        initOfflineDetection();
        updatePendingSyncBadge();
      });
    </script>
    <script>
      // global install prompt handler
      let deferredInstall;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredInstall = e;
        if (!document.getElementById("installBtn")) {
          const btn = document.createElement("button");
          btn.id = "installBtn";
          btn.textContent = "Installa app";
          btn.style.position = "fixed";
          btn.style.bottom = "20px";
          btn.style.right = "20px";
          btn.style.padding = "10px 16px";
          btn.style.background = "#007bff";
          btn.style.color = "#fff";
          btn.style.border = "none";
          btn.style.borderRadius = "4px";
          btn.style.zIndex = 10000;
          btn.onclick = async () => {
            if (!deferredInstall) return;
            deferredInstall.prompt();
            const choice = await deferredInstall.userChoice;
            console.log("install choice", choice.outcome);
            deferredInstall = null;
            btn.remove();
          };
          document.body.appendChild(btn);
        }
      });
    </script>
    <script>
      // helper that sets authorization header automatically
      function apiFetch(url, opts = {}) {
        opts.headers = opts.headers || {};
        const token = localStorage.getItem("authToken");
        if (token) opts.headers["Authorization"] = "Bearer " + token;
        return fetch(url, opts);
      }

      function showNotification(msg, error) {
        const note = document.getElementById("notification");
        if (!note) return alert(msg);
        note.textContent = msg;
        note.style.background = error ? "#f44336" : "#4caf50";
        note.style.display = "block";
        setTimeout(() => {
          note.style.display = "none";
        }, 2000);
      }

      function fetchSession() {
        return apiFetch("/api/session").then((r) => r.json());
      }

      function loadPending() {
        apiFetch("/api/pending-users")
          .then((r) => r.text())
          .then((txt) => {
            try {
              return JSON.parse(txt);
            } catch (e) {
              throw new Error("bad json:" + txt);
            }
          })
          .then((data) => {
            const container = document.getElementById("pendingContainer");
            // remove old rows (keep header)
            const oldRows = container.querySelectorAll(".row:not(.header)");
            oldRows.forEach((el) => el.remove());
            // sort pending list alphabetically by name (fallback to username)
            data.sort((a, b) => {
              const na = (a.name || a.username || "").toLowerCase();
              const nb = (b.name || b.username || "").toLowerCase();
              return na < nb ? -1 : na > nb ? 1 : 0;
            });
            // update counter at top
            const countSpan = document.getElementById("pending-count");
            if (countSpan) countSpan.textContent = "(" + data.length + ")";
            if (data.length === 0) {
              const container = document.getElementById("pendingContainer");
              const msg = document.createElement("div");
              msg.className = "row";
              msg.innerHTML =
                '<div class="cell" colspan="3" style="text-align:center;">(nessun utente in attesa)</div>';
              container.appendChild(msg);
            }
            data.forEach((u) => {
              const row = document.createElement("div");
              row.className = "row";
              const nameDiv = document.createElement("div");
              nameDiv.className = "cell";
              nameDiv.textContent = u.name || "";
              const userDiv = document.createElement("div");
              userDiv.className = "cell";
              userDiv.textContent = u.username || "";
              const actDiv = document.createElement("div");
              actDiv.className = "cell actions";
              // buttons
              const approveBtn = document.createElement("button");
              approveBtn.title = "Approva";
              approveBtn.style.marginRight = "6px";
              approveBtn.innerHTML =
                '<span class="material-symbols-outlined" style="color:green;">add_task</span>';
              approveBtn.addEventListener("click", () => handleApprove(u.uid));
              const rejectBtn = document.createElement("button");
              rejectBtn.title = "Rifiuta";
              rejectBtn.innerHTML =
                '<span class="material-symbols-outlined" style="color:red;">person_remove</span>';
              rejectBtn.addEventListener("click", () => handleReject(u.uid));
              actDiv.appendChild(approveBtn);
              actDiv.appendChild(rejectBtn);
              row.appendChild(nameDiv);
              row.appendChild(userDiv);
              row.appendChild(actDiv);
              container.appendChild(row);
            });
          })
          .catch((err) => {
            console.error("failed to load pending users", err);
            showNotification("Errore caricamento", true);
          });
      }

      // fetch list of already approved users and display in second table
      function loadApproved() {
        apiFetch("/approved-users")
          .then((r) => r.text())
          .then((txt) => {
            try {
              return JSON.parse(txt);
            } catch (e) {
              throw new Error("bad json:" + txt);
            }
          })
          .then((data) => {
            const container = document.getElementById("approvedContainer");
            const oldRows = container.querySelectorAll(".row:not(.header)");
            oldRows.forEach((el) => el.remove());
            if (!Array.isArray(data)) {
              console.warn("approved-users returned unexpected data", data);
              showNotification("Errore caricamento autorizzati", true);
              return;
            }
            const approvedCountSpan = document.getElementById("approved-count");
            if (approvedCountSpan) {
              const primaryEmail = "paolo.giorsetti@codarini.com";
              const count = data.filter(
                (u) => u.username !== primaryEmail
              ).length;
              approvedCountSpan.textContent = "(" + count + ")";
            }
            if (data.length === 0) {
              const msg = document.createElement("div");
              msg.className = "row";
              msg.innerHTML =
                '<div class="cell" colspan="3" style="text-align:center;">(nessun utente autorizzato)</div>';
              container.appendChild(msg);
            } else {
              // ensure Paolo is shown first with orange highlight
              // we filter and then iterate to control order
              const primaryEmail = "paolo.giorsetti@codarini.com";
              const [primary, others] = data.reduce(
                (acc, u) => {
                  (u.username === primaryEmail ? acc[0] : acc[1]).push(u);
                  return acc;
                },
                [[], []]
              );
              // sort 'others' alphabetically by name, falling back to username
              others.sort((a, b) => {
                const na = (a.name || a.username || "").toLowerCase();
                const nb = (b.name || b.username || "").toLowerCase();
                return na < nb ? -1 : na > nb ? 1 : 0;
              });
              [...primary, ...others].forEach((u) => {
                const row = document.createElement("div");
                row.className = "row";
                if (u.username === primaryEmail) {
                  row.style.background = "#ffe5b4"; // light orange background
                }
                const nameDiv = document.createElement("div");
                nameDiv.className = "cell";
                nameDiv.textContent = u.name || "";
                const userDiv = document.createElement("div");
                userDiv.className = "cell";
                userDiv.textContent = u.username || "";
                const actDiv = document.createElement("div");
                actDiv.className = "cell actions";
                // adjust text color for Paolo row so it isn’t the default green
                if (u.username === primaryEmail) {
                  nameDiv.style.color = "#777";
                  userDiv.style.color = "#777";
                }
                // special-case the primary admin account: non-clickable icon with tooltip
                if (u.username === primaryEmail) {
                  const icon = document.createElement("span");
                  icon.className = "material-symbols-outlined";
                  icon.textContent = "admin_panel_settings";
                  icon.style.color = "#777";
                  icon.title = "Administrator";
                  // keep pointer default
                  actDiv.appendChild(icon);
                } else {
                  const revokeBtn = document.createElement("button");
                  revokeBtn.title = "Revoca autorizzazione";
                  revokeBtn.innerHTML =
                    '<span class="material-symbols-outlined" style="color:red;">person_remove</span>';
                  revokeBtn.addEventListener("click", () =>
                    handleRevoke(u.uid)
                  );
                  actDiv.appendChild(revokeBtn);
                }
                row.appendChild(nameDiv);
                row.appendChild(userDiv);
                row.appendChild(actDiv);
                container.appendChild(row);
              });
            }
          })
          .catch((err) => {
            console.error("failed to load approved users", err);
            showNotification("Errore caricamento autorizzati", true);
          });
      }

      function handleApprove(uid) {
        apiFetch("/api/approve-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid })
        })
          .then((r) => r.json())
          .then((res) => {
            if (res.success) {
              showNotification("Utente approvato");
              loadPending();
              loadApproved();
            } else {
              showNotification("Errore approvazione", true);
            }
          })
          .catch((err) => {
            console.error(err);
            showNotification("Errore approvazione", true);
          });
      }

      function handleRevoke(uid) {
        apiFetch("/api/revoke-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid })
        })
          .then((r) => r.json())
          .then((res) => {
            if (res.success) {
              showNotification("Autorizzazione revocata");
              loadPending();
              loadApproved();
            } else {
              showNotification("Errore revoca", true);
            }
          })
          .catch((err) => {
            console.error(err);
            showNotification("Errore revoca", true);
          });
      }
      function handleReject(uid) {
        apiFetch("/api/reject-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid })
        })
          .then((r) => r.json())
          .then((res) => {
            if (res.success) {
              showNotification("Utente rifiutato");
              loadPending();
            } else {
              showNotification("Errore rifiuto", true);
            }
          })
          .catch((err) => {
            console.error(err);
            showNotification("Errore rifiuto", true);
          });
      }

      // onload, verifica sessione/admin rights
      fetchSession()
        .then((data) => {
          if (!data.loggedIn) {
            window.location = "/";
            return;
          }
          if (!data.admin) {
            showNotification("Non sei autorizzato", true);
            // optionally redirect later
            return;
          }
          document.getElementById("userInfo").innerHTML =
            `<span class="material-symbols-outlined" style="vertical-align:middle; font-size:1.2em; margin-right:4px;">man</span> ${data.name || data.uid}`;
          loadPending();
          loadApproved();
          // refresh counts every 30 seconds so badge stays up to date
          setInterval(() => {
            loadPending();
            loadApproved();
          }, 30000);
        })
        .catch((err) => {
          console.error("session error", err);
          window.location = "/";
        });
    </script>
    <script>
      // Service Worker registration
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then((reg) => {
              console.log("✓ Service Worker registered", reg);
              reg.addEventListener("updatefound", () => {
                const newWorker = reg.installing;
                newWorker.addEventListener("statechange", () => {
                  if (newWorker.state === "activated") {
                    console.log("✓ New Service Worker activated");
                    if (
                      window.confirm("Nuova versione disponibile! Ricaricare?")
                    ) {
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch((err) => console.error("✗ SW registration failed:", err));
        });
      }

      function triggerSync() {
        if ("serviceWorker" in navigator && "SyncManager" in window) {
          navigator.serviceWorker.ready.then((reg) => {
            reg.sync
              .register("sync-queue")
              .then(() => console.log("✓ Background sync registered"))
              .catch((err) =>
                console.error("✗ Sync registration failed:", err)
              );
          });
        }
      }

      window.addEventListener("online", () => {
        console.log("✓ Back online");
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.controller?.postMessage({ type: "SYNC_NOW" });
        }
        triggerSync();
      });

      window.addEventListener("offline", () => {
        console.log("✗ Offline");
      });

      if (navigator.onLine) {
        triggerSync();
      }
    </script>
  </body>
</html>
