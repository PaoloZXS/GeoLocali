<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#70c1ff" />
      <stop offset="100%" stop-color="#2a7cff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <!-- phone body -->
  <rect x="30" y="16" width="160" height="188" rx="28" fill="#0d1d3f" filter="url(#shadow)"/>
  <rect x="40" y="26" width="140" height="168" rx="20" fill="#ffffff" />

  <!-- map area -->
  <rect x="48" y="34" width="124" height="140" rx="16" fill="#e7f2ff" />
  <path d="M58 60 L98 56 L118 94 L152 86 L168 118" stroke="#0c4c9a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="58" cy="60" r="6" fill="#ff4b4b" stroke="#ffffff" stroke-width="3"/>
  <circle cx="168" cy="118" r="6" fill="#28b125" stroke="#ffffff" stroke-width="3"/>

  <!-- icons on map -->
  <circle cx="84" cy="110" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="74" cy="132" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="122" cy="100" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- bottom slider bar -->
  <rect x="52" y="164" width="116" height="8" rx="4" fill="#d1e1ff" />
  <circle cx="86" cy="168" r="8" fill="#0d1d3f" />
  <circle cx="154" cy="168" r="8" fill="#0d1d3f" />
</svg>
