<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password dimenticata</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login/style.css">
</head>
<body>
    <div class="login-container">
        <h2>Recupera password</h2>
        <form id="forgotForm" action="#" method="post">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Inserisci email">
            <button type="submit">Invia</button>
        </form>
        <div class="footer-link">
            <a href="/login/login.html">Torna al login</a>
        </div>
    </div>
    <div id="notification" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4caf50;color:#fff;padding:10px 20px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-family:sans-serif;z-index:1000;"></div>
    <script>
        function showNotification(msg, error) {
            const existing = document.getElementById('notification');
            if (existing) {
                existing.textContent = msg;
                existing.style.background = error ? '#f44336' : '#4caf50';
                existing.style.display = 'block';
                setTimeout(()=>{ existing.style.display='none'; }, 4000);
            } else {
                alert(msg);
            }
        }
        function apiFetch(url, opts={}) {
            opts.headers = opts.headers || {};
            const token = localStorage.getItem('authToken');
            if (token) opts.headers['Authorization'] = 'Bearer '+token;
            return fetch(url, opts);
        }

        document.getElementById('forgotForm').addEventListener('submit', e=>{
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showNotification('Inserisci un indirizzo email', true);
                return;
            }
            apiFetch('/api/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username: email})
            }).then(r=>r.json()).then(resp=>{
                if (resp.success) {
                    showNotification('Nuova password: '+resp.newPassword);
                } else {
                    showNotification('Errore: '+(resp.error||''), true);
                }
            }).catch(err=>{console.error(err);showNotification('Errore di rete', true);});
        });
    </script>
    <script type="module">
        // Import offline support modules
        import { initOfflineDetection } from '/offline.js';

        // Initialize offline detection on load
        window.addEventListener('load', () => {
            initOfflineDetection();
        });
    </script>
    <script>
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(reg => console.log('✓ Service Worker registered'))
                    .catch(err => console.error('✗ SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
