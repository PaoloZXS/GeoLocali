<!DOCTYPE html>
<html>
<head>
    <title>Mappa con due punti - MAKER</title>
    <!-- CSS di Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
            width: 100%;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Rubik', sans-serif;
        }
        .info {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .marker-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .marker-dot.red { background-color: #FF0000; border: 2px solid #CC0000; }
        .marker-dot.blue { background-color: #0000FF; border: 2px solid #0000CC; }
    </style>
</head>
<body>
    <div class="info">
        <h2>🗺️ Mappa con OpenStreetMap + Leaflet</h2>
        <p>Questa pagina mostra due marker distinti (rosso e blu) senza richiedere alcuna API key.</p>
        <div class="legend">
            <div class="legend-item">
                <div class="marker-dot red"></div>
                <span>Maker 1 (Rosso)</span>
            </div>
            <div class="legend-item">
                <div class="marker-dot blue"></div>
                <span>Maker 2 (Blu)</span>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <!-- JavaScript di Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // coordinate dei due marker (modificabili manualmente)
            const maker1 = [41.9028, 12.4964]; // esempio
            const maker2 = [45.4642, 9.1900];
            const center = [
                (maker1[0] + maker2[0]) / 2,
                (maker1[1] + maker2[1]) / 2
            ];

            const map = L.map('map').setView(center, 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
            }).addTo(map);

            const redIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div style="background-color: #FF0000; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>',
                iconSize: [26,26],
                popupAnchor: [0,-13]
            });
            const blueIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div style="background-color: #0000FF; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>',
                iconSize: [26,26],
                popupAnchor: [0,-13]
            });

            L.marker(maker1, { icon: redIcon }).addTo(map).bindPopup('Maker 1');
            L.marker(maker2, { icon: blueIcon }).addTo(map).bindPopup('Maker 2');
        });
    </script>

</body>
</html>
