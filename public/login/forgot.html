<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password dimenticata</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/login/style.css" />
  </head>
  <body>
    <div class="login-container">
      <h2>Recupera password</h2>
      <form id="forgotForm" action="#" method="post">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="Inserisci email"
        />
        <button type="submit">Invia</button>
      </form>
      <div class="footer-link">
        <a href="/login/login.html">Torna al login</a>
      </div>
    </div>
    <div
      id="notification"
      style="
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        color: #fff;
        padding: 10px 20px;
        border-radius: 4px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        font-family: sans-serif;
        z-index: 1000;
      "
    ></div>
    <script type="module">
      // Load modules robustly (supports both /offline.js and /public/offline.js paths)
      async function importWithFallback(primary, fallback) {
        const tryLoad = async (path) => {
          try {
            const res = await fetch(path, {
              method: "HEAD",
              cache: "no-store"
            });
            if (res.ok) return await import(path);
          } catch (e) {
            // ignore
          }
          return null;
        };

        const mod = (await tryLoad(primary)) || (await tryLoad(fallback));
        if (!mod)
          throw new Error(`Unable to load module: ${primary} or ${fallback}`);
        return mod;
      }

      const OfflineModule = await importWithFallback(
        "/offline.js",
        "/public/offline.js"
      );
      const Offline = OfflineModule.default || OfflineModule;
      const { initOfflineDetection } = Offline;

      // Initialize offline detection on load
      window.addEventListener("load", () => {
        initOfflineDetection();
      });
    </script>
    <script>
      // Service Worker registration
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then((reg) => console.log("✓ Service Worker registered"))
            .catch((err) => console.error("✗ SW registration failed:", err));
        });
      }
    </script>
  </body>
</html>
